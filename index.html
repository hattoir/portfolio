<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS.RBT — ハードウェア＆ロボティクス ポートフォリオ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+Antique:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css?v=8">
    <meta name="description" content="Portfolio of a Hardware and Robotics Engineer. Explore my projects, activities, and specific learnings.">
</head>
<body>
    <div class="grid-background"></div>
    
    <div class="side-label-left">SYS.RBT_PORTFOLIO // STATUS: ONLINE</div>
    <div class="side-label-right">0x8F9B // OPERATOR: ENG</div>
    
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-text">SYS.RBT_</span>
                <span class="cursor"></span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">ホーム</a></li>
                <li><a href="profile.html">プロフィール</a></li>
                <li><a href="works.html">作品</a></li>
                <li><a href="activities.html">活動実績</a></li>
                <li><a href="learning.html">学習</a></li>
            </ul>
            <div class="hamburger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </div>
    </nav>

    <main class="home-main">
        <section class="hero" id="home">
            <div class="hero-bg"></div>
            <div class="hero-grid"></div>
            <div class="hero-scan"></div>
            
            <!-- Stars -->
            <div class="sparks-container">
                <div class="spark" style="top: 10%; left: 12%; animation-delay: 0s;"></div>
                <div class="spark" style="top: 55%; left: 88%; animation-delay: 1.5s;"></div>
                <div class="spark" style="top: 20%; left: 75%; animation-delay: 3s;"></div>
                <div class="spark" style="top: 70%; left: 18%; animation-delay: 0.5s;"></div>
                <div class="spark" style="top: 35%; left: 95%; animation-delay: 4.5s;"></div>
                <div class="spark" style="top: 8%; left: 55%; animation-delay: 2s;"></div>
                <div class="spark" style="top: 45%; left: 5%; animation-delay: 2.5s;"></div>
                <div class="spark" style="top: 15%; left: 40%; animation-delay: 1s;"></div>
            </div>
            
            <div class="hero-content">
                <div class="system-status">
                    <span class="status-dot"></span> システムオンライン
                </div>
                <h1 class="glitch" data-text="服部　将眞">服部　将眞</h1>
                <p class="hero-subtitle">ECCコンピュータ専門学校<br><span style="font-size: 14px; opacity: 0.85; display: block; margin-top: 0.6rem; letter-spacing: 0.15em; font-family: var(--font-jp-sans); font-weight: 300;">IoT部 副部長</span></p>
            </div>
            
            <div class="hero-visual">
                <!-- Space objects -->
                <div class="space-objects">
                    <div class="satellite sat-1">🛰️</div>
                    <div class="satellite sat-2">🛰️</div>
                    <div class="shooting-star ss-1"></div>
                    <div class="shooting-star ss-2"></div>
                </div>

                <!-- Earth in background -->
                <div class="earth-glow"></div>
                <div class="earth"></div>

                <!-- Saturn V Rocket -->
                <div class="saturn-v">
                    <div class="les"></div>
                    <div class="command-module"></div>
                    <div class="service-module"></div>
                    <div class="s-ivb"></div>
                    <div class="interstage"></div>
                    <div class="s-ii"></div>
                    <div class="s-ic"></div>
                    <div class="saturn-fins">
                        <div class="saturn-fin saturn-fin-l"></div>
                        <div class="saturn-fin saturn-fin-r"></div>
                    </div>
                    <div class="engine-cluster"></div>
                    <div class="saturn-flame">
                        <div class="saturn-flame-outer"></div>
                        <div class="saturn-flame-mid"></div>
                        <div class="saturn-flame-core"></div>
                    </div>
                    <div class="exhaust-trail">
                        <div class="trail-particle" style="--delay: 0s; --x: -10px; --dur: 0.8s;"></div>
                        <div class="trail-particle" style="--delay: 0.12s; --x: 8px; --dur: 0.7s;"></div>
                        <div class="trail-particle" style="--delay: 0.25s; --x: -6px; --dur: 1s;"></div>
                        <div class="trail-particle" style="--delay: 0.4s; --x: 12px; --dur: 0.9s;"></div>
                        <div class="trail-particle" style="--delay: 0.55s; --x: -14px; --dur: 0.85s;"></div>
                        <div class="trail-particle" style="--delay: 0.7s; --x: 4px; --dur: 1.1s;"></div>
                    </div>
                </div>

                <!-- Lunar surface -->
                <div class="lunar-surface"></div>

                <!-- Data readouts -->
                <div class="engine-data data-left">
                    <span class="data-label">MISSION</span>
                    <span class="data-value">APOLLO</span>
                </div>
                <div class="engine-data data-right">
                    <span class="data-label">ALT</span>
                    <span class="data-value">384,400 km</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="year"></span> SYS.RBT. All rights reserved.</p>
            <div class="system-id">SYS.ID: 0x8F9B</div>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
